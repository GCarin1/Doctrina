name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests + self-validate (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20.12", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run CLI test suite
        run: node --test
        working-directory: packages/doctrina-cli

      - name: Self-validate (doctrina validate against own .doctrina/)
        run: node packages/doctrina-cli/src/index.js validate

      - name: Index drift gate (doctrina index rebuild --check)
        run: node packages/doctrina-cli/src/index.js index rebuild --check
