name: Deploy docs to GitHub Pages

# The documentation site is a static docsify app served straight from docs/
# (no build step). This workflow publishes it to GitHub Pages on every push to
# main that touches the docs, plus on demand. One-time setup: in the repo's
# Settings → Pages, set Source to "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege: read the repo, write the Pages deployment, mint the OIDC
# token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; cancel a superseded in-flight run, but let a
# running deploy finish (do not cancel mid-publish).
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Upload docs/ as-is. It already carries .nojekyll, so GitHub does not
      # run Jekyll and the docsify _sidebar.md (underscore-prefixed) is served.
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
